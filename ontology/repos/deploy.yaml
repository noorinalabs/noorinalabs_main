# noorinalabs-deploy — Repo Ontology
# Updated by /ontology-rebuild.

repo: noorinalabs-deploy
description: Deployment orchestration — Terraform, Docker Compose, CI/CD workflows, observability

terraform_modules:
  hetzner:
    path: terraform/hetzner/
    layout: per-env
    # Per ADR 0001 (deploy#82, P2W10): envs/{stg,prod}/ root modules each call shared modules/hetzner-vps/.
    # Working directory IS the env selector (no Terraform workspaces).
    shared_module:
      path: terraform/hetzner/modules/hetzner-vps/
      provider: hetznercloud/hcloud ~> 1.49
      resource_naming: "noorinalabs-${var.env}[-suffix]"  # server, firewall, ssh-key all use ${env}
      labels: { project: noorinalabs, environment: "${var.env}" }
    envs:
      stg:
        path: terraform/hetzner/envs/stg/
        server: { name: noorinalabs-stg, type: CPX21, location: ash, image: ubuntu-24.04 }
        state_key: hetzner/stg.tfstate
      prod:
        path: terraform/hetzner/envs/prod/
        server: { name: noorinalabs-prod, type: CPX41, location: ash, image: ubuntu-24.04 }
        state_key: hetzner/prod.tfstate
    state_backend: { type: s3, bucket: noorinalabs-terraform-state, endpoint: backblaze-b2, region: us-east-005 }
    firewall_rules: [SSH/22, HTTP/80, HTTPS/443]
    outputs_per_env: [env, server_name, server_ip, server_ipv6, ssh_target, labels, server_status]
    notes:
      - "Pre-wave-10 root at terraform/hetzner/ used single state key hetzner/terraform.tfstate — migrated to hetzner/prod.tfstate."
      - "Hand-made isnad-graph-prod VPS (outside Terraform) remains live until deploy#86 decommission."
    adr: docs/adr/0001-tf-hetzner-per-env-state-strategy.md

  cloudflare:
    path: terraform/cloudflare/
    provider: cloudflare/cloudflare ~> 4.43
    resources:
      zone_settings: { ssl: strict, min_tls: "1.2", always_https: true, automatic_https_rewrites: "on" }
      dns_records:
        - { name: "@", type: A, target: var.vps_ipv4_address, proxied: false }
        - { name: www, type: CNAME, target: noorinalabs.com, proxied: false }
      subdomains:
        variable: "var.subdomains (map of name → proxied_bool)"
        default: { isnad-graph: false }
        # Per-service stg subdomains (e.g., stg.isnad-graph, stg.landing) added via deploy#83 / PR #157.
        open_pr: "deploy#157 (P2W10) — stg + per-service subdomains across both envs"

docker_services:
  compose_file: compose/docker-compose.prod.yml
  networks:
    backend: { internal: true, description: "Databases, API, observability" }
    frontend: { internal: false, description: "Public-facing via Caddy" }
    user-backend: { internal: true, description: "User service + dedicated DBs" }

  application:
    api: { image: "ghcr.io/noorinalabs/noorinalabs-isnad-graph", port: 8000, memory: 2G, cpus: 2.0 }
    frontend: { image: "ghcr.io/noorinalabs/noorinalabs-isnad-graph-frontend", port: 80, memory: 512M }
    landing: { image: "ghcr.io/noorinalabs/noorinalabs-landing-page", port: 80, memory: 256M }
    user-service: { image: "ghcr.io/noorinalabs/noorinalabs-user-service", port: 8000, memory: 1G }
    caddy: { image: "caddy:2-alpine", ports: [80, 443], config: caddy/Caddyfile }

  databases:
    neo4j: { image: "neo4j:5-community", ports: [7474, 7687], memory: 8G, plugins: [apoc, gds] }
    postgres: { image: "pgvector/pgvector:pg16", port: 5432, memory: 4G }
    redis: { image: "redis:7-alpine", port: 6379, memory: 1G }
    user-postgres: { image: "postgres:16-alpine", port: 5433, memory: 2G }
    user-redis: { image: "redis:7-alpine", port: 6380, memory: 512M }

  observability:
    prometheus: { image: "prom/prometheus:v3.4.0", port: 9090, retention: 30d }
    grafana: { image: "grafana/grafana:11.6.0", port: 3000, path: /grafana }
    loki: { image: "grafana/loki:2.9.10", port: 3100, retention: 7d }
    promtail: { image: "grafana/promtail:3.4.1", scrape: docker_socket }
    alertmanager: { image: "prom/alertmanager:v0.28.1", port: 9093 }
    node-exporter: { image: "prom/node-exporter:v1.9.1", port: 9100 }
    postgres-exporter: { image: "quay.io/prometheuscommunity/postgres-exporter:v0.16.0", port: 9187 }
    user-postgres-exporter: { image: "quay.io/prometheuscommunity/postgres-exporter:v0.16.0", port: 9187 }

  messaging:
    kafka: { image: "bitnamilegacy/kafka:3.8.0", mode: KRaft, listeners: [INTERNAL/9092, CONTROLLER/9093], user: "1001:0", topics_init: kafka-init }
    kafka-init: { image: "bitnamilegacy/kafka:3.8.0", purpose: "one-shot topic creation via init-topics.sh" }
    kafka-ui: { image: "provectuslabs/kafka-ui:v0.7.2", port: "127.0.0.1:8085", auth: basic, readonly: true }

workflows:
  deploy_isnad_graph: { trigger: repository_dispatch, target: [api, frontend], health_check: 120s }
  deploy_landing: { trigger: workflow_dispatch, target: [landing], health_check: 60s }
  deploy_all: { trigger: workflow_dispatch, target: all, health_check: 120s }
  verify_deploy: { trigger: workflow_run, checks: [HTTPS, health, TLS] }
  terraform:
    trigger: "pull_request + push to main (terraform/**)"
    jobs:
      fmt: "terraform fmt -check -recursive"
      validate: "matrix over [modules/hetzner-vps, envs/stg, envs/prod, cloudflare, backblaze] — -backend=false"
      plan: "matrix over [stg, prod] — PR only — comments plan on PR"
      apply: "matrix over [stg, prod] with max-parallel=1 — push to main only — stg before prod"
    environments: { stg: staging, prod: production }
  integration_tests:
    trigger: "pull_request + push to main + workflow_dispatch"
    purpose: "cross-repo integration suite (#49)"
    sibling_ref_resolution: "wave-aware — resolve user-service + isnad-graph refs to same wave branch when PR base = deployments/* (with main fallback). Added in #159 (Aisha, P2W10)."
  rollback: { trigger: workflow_dispatch, inputs: [image_tag, service] }
  # Promotion pathway (P2W10, section A — all merged):
  promote: { pr: "deploy#155 (Aisha)", issue: "#84", status: merged, description: "stg auto-deploy + prod manual-approval promotion (Contract v6 image-tag retag)" }
  deploy_stg: { pr: "deploy#155 (Aisha)", issue: "#84", status: merged, trigger: "repository_dispatch from service repos (deploy-noorinalabs-{isnad-graph,user-service,landing-page})" }
  deploy_prod: { pr: "deploy#155 (Aisha)", issue: "#84", status: merged, trigger: "manual approval in production GH Environment" }
  alembic_pre_deploy_gate:
    workflow: .github/workflows/db-migrate.yml
    pr: "deploy#153 (Lucas)"
    issue: "#85"
    status: merged
    description: "Reusable workflow_call. Per-env GH Environment mapping. Heads-count assertion on `0040` + `alembic upgrade head` (singular). Job output `migrated=true|false` set runner-side after SSH step (not inside ssh-action — see #153 review B1)."
    runbook: docs/runbooks/user-service-alembic.md
    callers_pending: "promote.yml not yet `uses:`-wires this workflow — tracked in deploy#160 (W11)"
    observability_followup: "Prometheus alert was deferred — textfile-collector emission tracked in deploy#161 (W11)"
  image_tag_invariants:
    workflow: .github/workflows/image-tag-invariants.yml
    pr: "deploy#155 (Aisha, bundled)"
    issue: "#84"
    status: merged
    description: "Smoke test asserting Contract v6 invariants — exactly 4 publish-side tags (sha-<short>, latest, stg-<short>, stg-latest) + exactly 2 promote-side tags (prod-<short>, prod-latest) per image."
    invariant_script: integration-tests/scripts/check_tag_invariants.py

environments:
  staging:
    vps: { provider: Hetzner, spec: "CPX21 (3 vCPU, 4GB)", location: Ashburn, name: noorinalabs-stg }
    domains: "isnad.stg.noorinalabs.com, auth.stg.noorinalabs.com, stg.noorinalabs.com (landing) — per merged #157"
    tls: "Caddy auto-provisioned Let's Encrypt"
    deploy_user: deploy
    deploy_method: "SSH via appleboy/ssh-action"
    state_key: hetzner/stg.tfstate
  production:
    vps: { provider: Hetzner, spec: "CPX41 (8 vCPU, 16GB)", location: Ashburn, name: noorinalabs-prod }
    domains: [noorinalabs.com, www.noorinalabs.com, isnad-graph.noorinalabs.com]
    tls: "Caddy auto-provisioned Let's Encrypt"
    deploy_user: deploy
    deploy_method: "SSH via appleboy/ssh-action"
    state_key: hetzner/prod.tfstate
    note: "Currently-live prod runs on hand-made isnad-graph-prod VPS outside Terraform (decommission tracked in deploy#86)."

local_patterns:
  rolling_update: "docker compose up -d --force-recreate + health poll"
  image_fallback: "GHCR-only for app services (api, frontend, landing, user-service); no local-build fallback. Infra services use upstream images directly."
  env_injection: "GitHub Actions writes .env on VPS via SSH"
  read_only_containers: "All app containers use read_only + tmpfs"
  network_isolation: "Backend networks are internal (not exposed)"

scripts:
  bootstrap_vps: scripts/bootstrap-vps.sh
  verify_deployment: scripts/verify_deployment.sh
  backup: scripts/backup.sh
  restore: scripts/restore.sh

integration_tests:
  path: integration-tests/
  compose: integration-tests/docker-compose.test.yml
  scripts:
    generate_test_secrets: integration-tests/scripts/generate_test_secrets.sh
    check_tag_invariants: "integration-tests/scripts/check_tag_invariants.py — Contract v6 four-publish-tags + two-promote-tags assertion (deploy#155 bundled)"
  workflow: .github/workflows/integration-tests.yml
  user_service_alembic: "Now uses `alembic upgrade head` (singular) per US wave-10 0040_merge_multi_heads.py landed (deploy#159)"
  notes:
    - "Sibling-repo refs are wave-aware (resolves user-service + isnad-graph to same wave branch when PR base = deployments/*, falls back to main). Added 2026-04-24 in deploy#159."

runbooks:
  user_service_alembic: docs/runbooks/user-service-alembic.md  # added in deploy#153 (Lucas, P2W10)
