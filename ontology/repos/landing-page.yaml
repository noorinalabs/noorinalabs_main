# noorinalabs-landing-page — Repo Ontology
# Updated by /ontology-rebuild.

repo: noorinalabs-landing-page
description: Organization landing page — static site (Astro + Tailwind)
tech_stack:
  framework: Astro 6.1
  language: TypeScript
  build_tool: Vite (via Astro)
  styling: Tailwind CSS 4.2 + design system tokens
  content: MDX with Zod schema validation
  deployment: Docker (multi-stage Node → Nginx Alpine)

modules:
  pages:
    path: src/pages/
    entries:
      - { route: /, file: index.astro, description: "Hero, mission, problem, capabilities, partnership, contact" }
      - { route: /about, file: about.astro, collection: pages }
      - { route: /projects/isnad-graph, file: projects/isnad-graph.astro, collection: projects }

  layouts:
    path: src/layouts/
    hierarchy:
      BaseLayout: { description: "HTML shell, meta tags, OG, favicon, skip-to-content" }
      PageLayout: { extends: BaseLayout, description: "Header nav, main content, footer" }
      ProjectLayout: { extends: PageLayout, description: "Hero, feature grid, MDX body" }

  components:
    SEO: { path: src/components/SEO.astro, description: "JSON-LD schemas — Organization, WebSite, custom per-page" }

  content_collections:
    projects: { path: src/content/projects/, schema: "title, description, ogImage, features[], cta, publishDate, draft" }
    pages: { path: src/content/pages/, schema: "title, description, ogImage, publishDate, draft" }

  styles:
    global: { path: src/styles/global.css, description: "Tailwind import + custom color theme" }
    color_palette:
      navy: { range: "50-950", primary: "#4157b1" }
      gold: { range: "50-900", primary: "#d4a22e" }
      neutral: { range: "50-900" }

pages:
  home_sections:
    - hero: "Title, subtitle, 4 value pillars, dual CTAs"
    - guiding_principle: "Mission statement blockquote"
    - problem: "5 fundamental questions, 3 statistics (1.9B users, 14+ centuries, 0 tools)"
    - capabilities: "5 capability cards (responsive grid)"
    - why_now: "3 cards (tools matured, data available, appetite growing)"
    - partnership: "3 partnership types (Research, Institutional, Grant)"
    - contact: "CTA to info@noorinalabs.com"

  navigation:
    header: [Home (/), About (/about), Projects (/#projects)]
    footer:
      projects: [Isnad Graph (https://isnad-graph.noorinalabs.com), About the Isnad Graph (/projects/isnad-graph)]
      organization: [About (/about), GitHub (https://github.com/noorinalabs)]

local_patterns:
  static_generation: "All pages pre-rendered at build time (no SSR)"
  content_as_code: "No CMS — MDX + Git versioning"
  seo: "JSON-LD structured data (Organization, WebSite, SoftwareApplication)"
  accessibility: "Axe Core Playwright checks, WCAG 2.2 AA"
  responsive: "Mobile-first breakpoints at 640px, 768px, 1024px"
  design_system: "@noorinalabs/design-system CSS tokens imported in BaseLayout"

build_commands:
  dev: "npm run dev (port 4321)"
  build: "npm run build → dist/"
  test: "npm run test"
  e2e: "npm run test:e2e"
  lint: "npm run lint"
  typecheck: "npx astro check"
